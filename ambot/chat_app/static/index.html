<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBOT Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>AMBOT Chat</h1>
            <span id="turn-counter" class="turn-counter"></span>
        </div>
        <div class="header-right">
            <button id="new-session-btn" class="new-session-btn" title="New conversation">New Chat</button>
            <div class="header-status">
                <span class="status-dot checking" id="status-dot"></span>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </header>

    <div class="chat-area" id="chat-area">
        <div class="message system">
            Hi! I'm AMBOT. Ask me anything — general conversation, EECS questions, or robotics topics.
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="chat-input"
                   placeholder="Type a message..." autocomplete="off">
            <button class="send-btn" id="send-btn">Send</button>
        </div>
        <div class="input-hint">Press Enter to send · Knowledge base consulted only when needed</div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
