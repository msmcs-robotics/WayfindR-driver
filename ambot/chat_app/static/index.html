<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBOT Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>AMBOT Chat</h1>
        <div class="header-status">
            <span class="status-dot checking" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <div class="chat-area" id="chat-area">
        <div class="message system">
            Ask me anything about EECS, robotics, or the AMBOT project.
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="chat-input"
                   placeholder="Type a question..." autocomplete="off">
            <button class="send-btn" id="send-btn">Send</button>
        </div>
        <div class="input-hint">Press Enter to send</div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
